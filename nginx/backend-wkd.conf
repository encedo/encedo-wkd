# encedo-wkd backend locations
# Install path: /opt/zextras/conf/nginx/extensions/backend-wkd.conf
# Owner: zextras:zextras
# Included inside server{} HTTPS block

# ---------------------------------------------------------------------------
# WKD — Direct method
# Handles: /.well-known/openpgpkey/hu/<hash> and /.well-known/openpgpkey/policy
# Domain is extracted from the Host header by the server.
# ---------------------------------------------------------------------------
location /.well-known/openpgpkey {
    proxy_pass         http://wkd_server;
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 10s;
    proxy_connect_timeout 5s;

    add_header Access-Control-Allow-Origin "*" always;
}

# ---------------------------------------------------------------------------
# WKD publish / revoke API (internal use only — restrict access as needed)
# ---------------------------------------------------------------------------
location /api/ {
    proxy_pass         http://wkd_server;
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_read_timeout 10s;
    proxy_connect_timeout 5s;
}

