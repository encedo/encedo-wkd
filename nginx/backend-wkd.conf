# encedo-wkd backend locations
# Install path: /opt/zextras/conf/nginx/extensions/backend-wkd.conf
# Owner: zextras:zextras
# Included inside server{} HTTPS block (main Carbonio domain)
#
# Exposes WKD publish/revoke API at:
#   POST   https://<carbonio-domain>/wkd/api/publish
#   DELETE https://<carbonio-domain>/wkd/api/revoke
#
# Authorization: Carbonio auth token must be present in X-Auth-Token header.
# server.py validates the token against Carbonio AuthRequest SOAP endpoint.

location /wkd/ {
    proxy_pass         http://wkd_server/;
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Auth-Token      $http_x_auth_token;
    proxy_read_timeout 10s;
    proxy_connect_timeout 5s;
}
